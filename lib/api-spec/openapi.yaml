openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 1.0.0
  description: HRM + Distributor ERP Platform API — Phase 1 (Auth, Employees, Attendance, Leave)
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication & user profile
  - name: companies
    description: Company / tenant management
  - name: departments
    description: Department management
  - name: job-titles
    description: Job title management
  - name: employees
    description: Employee management
  - name: attendance
    description: Attendance tracking
  - name: leave
    description: Leave requests & balances
  - name: dashboard
    description: Executive dashboard KPIs

paths:
  # ── Health ─────────────────────────────────────────────────────────────
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── Auth ───────────────────────────────────────────────────────────────
  /v1/auth/login:
    post:
      operationId: loginUser
      tags: [auth]
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Login successful or MFA required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/auth/logout:
    post:
      operationId: logoutUser
      tags: [auth]
      summary: Logout — revoke refresh token
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LogoutInput"
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessMessage"

  /v1/auth/refresh:
    post:
      operationId: refreshToken
      tags: [auth]
      summary: Refresh access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshInput"
      responses:
        "200":
          description: New access token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RefreshResponse"
        "401":
          description: Invalid or expired refresh token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user profile
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
    patch:
      operationId: updateMe
      tags: [auth]
      summary: Update current user profile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserProfileUpdate"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  /v1/auth/change-password:
    patch:
      operationId: changePassword
      tags: [auth]
      summary: Change password
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasswordChangeInput"
      responses:
        "200":
          description: Password changed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessMessage"

  /v1/auth/forgot-password:
    post:
      operationId: forgotPassword
      tags: [auth]
      summary: Send password reset email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgotPasswordInput"
      responses:
        "200":
          description: Reset email sent (always returns 200 to prevent enumeration)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessMessage"

  /v1/auth/reset-password:
    post:
      operationId: resetPassword
      tags: [auth]
      summary: Reset password with token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordInput"
      responses:
        "200":
          description: Password reset successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessMessage"

  /v1/auth/mfa/setup:
    post:
      operationId: setupMfa
      tags: [auth]
      summary: Enable MFA — returns QR code and secret
      security:
        - bearerAuth: []
      responses:
        "200":
          description: MFA setup info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MfaSetupResponse"

  /v1/auth/mfa/verify:
    post:
      operationId: verifyMfa
      tags: [auth]
      summary: Verify MFA code and complete login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MfaVerifyInput"
      responses:
        "200":
          description: MFA verified — returns full tokens
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenPair"

  /v1/auth/mfa/disable:
    post:
      operationId: disableMfa
      tags: [auth]
      summary: Disable MFA
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MfaDisableInput"
      responses:
        "200":
          description: MFA disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessMessage"

  # ── Companies ──────────────────────────────────────────────────────────
  /v1/companies:
    post:
      operationId: createCompany
      tags: [companies]
      summary: Create company (initial tenant setup)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompanyInput"
      responses:
        "201":
          description: Company created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Company"

  /v1/companies/me:
    get:
      operationId: getMyCompany
      tags: [companies]
      summary: Get current tenant company details
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Company details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Company"
    patch:
      operationId: updateMyCompany
      tags: [companies]
      summary: Update company settings
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompanyUpdate"
      responses:
        "200":
          description: Updated company
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Company"

  # ── Departments ────────────────────────────────────────────────────────
  /v1/departments:
    get:
      operationId: listDepartments
      tags: [departments]
      summary: List all departments in the company
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Department list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Department"
    post:
      operationId: createDepartment
      tags: [departments]
      summary: Create a new department
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DepartmentInput"
      responses:
        "201":
          description: Department created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Department"

  /v1/departments/{id}:
    get:
      operationId: getDepartment
      tags: [departments]
      summary: Get department details
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Department details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Department"
    patch:
      operationId: updateDepartment
      tags: [departments]
      summary: Update department
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DepartmentUpdate"
      responses:
        "200":
          description: Updated department
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Department"
    delete:
      operationId: deleteDepartment
      tags: [departments]
      summary: Delete department
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessMessage"

  # ── Job Titles ─────────────────────────────────────────────────────────
  /v1/job-titles:
    get:
      operationId: listJobTitles
      tags: [job-titles]
      summary: List all job titles
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Job title list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/JobTitle"
    post:
      operationId: createJobTitle
      tags: [job-titles]
      summary: Create a job title
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JobTitleInput"
      responses:
        "201":
          description: Job title created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobTitle"

  /v1/job-titles/{id}:
    patch:
      operationId: updateJobTitle
      tags: [job-titles]
      summary: Update a job title
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JobTitleUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobTitle"
    delete:
      operationId: deleteJobTitle
      tags: [job-titles]
      summary: Delete a job title
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessMessage"

  # ── Employees ──────────────────────────────────────────────────────────
  /v1/employees:
    get:
      operationId: listEmployees
      tags: [employees]
      summary: List employees (paginated, filterable)
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: departmentId
          in: query
          schema:
            type: ["string", "null"]
        - name: status
          in: query
          schema:
            type: ["string", "null"]
            enum: [ACTIVE, ON_LEAVE, TERMINATED, RESIGNED, SUSPENDED, null]
        - name: search
          in: query
          schema:
            type: ["string", "null"]
        - name: employmentType
          in: query
          schema:
            type: ["string", "null"]
            enum: [FULL_TIME, PART_TIME, CONTRACT, INTERN, null]
      responses:
        "200":
          description: Paginated employee list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmployeeListResponse"
    post:
      operationId: createEmployee
      tags: [employees]
      summary: Create a new employee
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmployeeInput"
      responses:
        "201":
          description: Employee created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employee"

  /v1/employees/org-chart:
    get:
      operationId: getOrgChart
      tags: [employees]
      summary: Get org chart tree
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Org chart tree
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OrgNode"

  /v1/employees/{id}:
    get:
      operationId: getEmployee
      tags: [employees]
      summary: Get employee details
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Employee details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employee"
    patch:
      operationId: updateEmployee
      tags: [employees]
      summary: Update employee details
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmployeeUpdate"
      responses:
        "200":
          description: Updated employee
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employee"
    delete:
      operationId: terminateEmployee
      tags: [employees]
      summary: Terminate employee (soft delete)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Employee terminated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessMessage"

  # ── Attendance ─────────────────────────────────────────────────────────
  /v1/attendance:
    get:
      operationId: listAttendance
      tags: [attendance]
      summary: List attendance records
      security:
        - bearerAuth: []
      parameters:
        - name: employeeId
          in: query
          schema:
            type: ["string", "null"]
        - name: from
          in: query
          schema:
            type: ["string", "null"]
            format: date
        - name: to
          in: query
          schema:
            type: ["string", "null"]
            format: date
        - name: status
          in: query
          schema:
            type: ["string", "null"]
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Attendance records
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttendanceListResponse"
    post:
      operationId: logAttendance
      tags: [attendance]
      summary: Log attendance (check-in or check-out)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AttendanceInput"
      responses:
        "201":
          description: Attendance logged
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttendanceRecord"

  /v1/attendance/summary:
    get:
      operationId: getAttendanceSummary
      tags: [attendance]
      summary: Monthly attendance summary for dashboard
      security:
        - bearerAuth: []
      parameters:
        - name: month
          in: query
          schema:
            type: integer
        - name: year
          in: query
          schema:
            type: integer
        - name: departmentId
          in: query
          schema:
            type: ["string", "null"]
      responses:
        "200":
          description: Attendance summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttendanceSummary"

  /v1/attendance/{id}:
    get:
      operationId: getAttendance
      tags: [attendance]
      summary: Get a single attendance record
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Attendance record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttendanceRecord"
    patch:
      operationId: updateAttendance
      tags: [attendance]
      summary: Update attendance record
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AttendanceUpdate"
      responses:
        "200":
          description: Updated attendance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttendanceRecord"

  # ── Leave ──────────────────────────────────────────────────────────────
  /v1/leaves:
    get:
      operationId: listLeaves
      tags: [leave]
      summary: List leave requests
      security:
        - bearerAuth: []
      parameters:
        - name: employeeId
          in: query
          schema:
            type: ["string", "null"]
        - name: status
          in: query
          schema:
            type: ["string", "null"]
            enum: [PENDING, APPROVED, REJECTED, CANCELLED, null]
        - name: leaveType
          in: query
          schema:
            type: ["string", "null"]
        - name: from
          in: query
          schema:
            type: ["string", "null"]
            format: date
        - name: to
          in: query
          schema:
            type: ["string", "null"]
            format: date
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Leave requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeaveListResponse"
    post:
      operationId: createLeaveRequest
      tags: [leave]
      summary: Submit a leave request
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LeaveRequestInput"
      responses:
        "201":
          description: Leave request submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeaveRequest"

  /v1/leaves/balances:
    get:
      operationId: getLeaveBalances
      tags: [leave]
      summary: Get leave balances for the current user (or specific employee)
      security:
        - bearerAuth: []
      parameters:
        - name: employeeId
          in: query
          schema:
            type: ["string", "null"]
        - name: year
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Leave balances
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LeaveBalance"

  /v1/leaves/calendar:
    get:
      operationId: getLeaveCalendar
      tags: [leave]
      summary: Team leave calendar for a given month
      security:
        - bearerAuth: []
      parameters:
        - name: month
          in: query
          schema:
            type: integer
        - name: year
          in: query
          schema:
            type: integer
        - name: departmentId
          in: query
          schema:
            type: ["string", "null"]
      responses:
        "200":
          description: Calendar events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LeaveCalendarEvent"

  /v1/leaves/{id}:
    get:
      operationId: getLeave
      tags: [leave]
      summary: Get leave request details
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Leave request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeaveRequest"
    delete:
      operationId: cancelLeave
      tags: [leave]
      summary: Cancel a pending leave request
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessMessage"

  /v1/leaves/{id}/approve:
    patch:
      operationId: approveLeave
      tags: [leave]
      summary: Approve a leave request
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LeaveActionInput"
      responses:
        "200":
          description: Approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeaveRequest"

  /v1/leaves/{id}/reject:
    patch:
      operationId: rejectLeave
      tags: [leave]
      summary: Reject a leave request
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LeaveActionInput"
      responses:
        "200":
          description: Rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeaveRequest"

  # ── Leave Policies ─────────────────────────────────────────────────────
  /v1/leave-policies:
    get:
      operationId: listLeavePolicies
      tags: [leave]
      summary: List leave policies
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Leave policies
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LeavePolicy"
    post:
      operationId: createLeavePolicy
      tags: [leave]
      summary: Create a leave policy
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LeavePolicyInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeavePolicy"

  /v1/leave-policies/{id}:
    patch:
      operationId: updateLeavePolicy
      tags: [leave]
      summary: Update a leave policy
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LeavePolicyUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeavePolicy"

  # ── Dashboard ──────────────────────────────────────────────────────────
  /v1/dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Executive dashboard KPIs
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

# ── Security Scheme ────────────────────────────────────────────────────────
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    # ── Shared ─────────────────────────────────────────────────────────────
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    SuccessMessage:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
